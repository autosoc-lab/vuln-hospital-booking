{% extends "base.html" %}

{% block content %}
  <section class="section-heading">
    <p class="eyebrow">Upload</p>
    <h1>문서 업로드</h1>
    <p>테스트 문서를 환자 문서함에 등록합니다.</p>
  </section>

  <form class="form wide-form" method="post" enctype="multipart/form-data" action="{{ url_for('user_pages.upload_document') }}">
    {% if g.current_user.role != "PATIENT" %}
      <label for="patient_public_id">환자</label>
      <select id="patient_public_id" name="patient_public_id" required>
        <option value="">선택</option>
        {% for patient in patients %}
          <option value="{{ patient.public_id }}">{{ patient.full_name }} · {{ patient.username }}</option>
        {% endfor %}
      </select>
    {% endif %}

    <label for="title">문서명</label>
    <input id="title" name="title" placeholder="예: 검사 결과지">

    <label for="document_type">문서 유형</label>
    <input id="document_type" name="document_type" value="테스트 문서">

    <label for="classification">분류</label>
    <select id="classification" name="classification">
      <option value="INTERNAL">INTERNAL</option>
      <option value="SENSITIVE">SENSITIVE</option>
      <option value="PUBLIC">PUBLIC</option>
    </select>

    <label for="file">파일</label>
    <input id="file" name="file" type="file" required>

    <button type="submit">업로드</button>
  </form>
{% endblock %}
