{% extends "base.html" %}

{% block content %}
  <section class="section-heading split-heading">
    <div>
      <p class="eyebrow">Clinic Guides</p>
      <h1>외부 자료 가져오기</h1>
      <p>협력 기관 홈페이지 등 외부 URL의 자료를 미리보기로 가져옵니다.</p>
    </div>
    <a class="secondary-link" href="{{ url_for('main.clinic_guides') }}">진료 안내문</a>
  </section>

  <form class="filter-form" method="get" action="{{ url_for('main.external_preview_page') }}">
    <label>
      외부 자료 URL
      <input name="url" type="text" value="{{ url }}" placeholder="https://partner-hospital.example.com/notice">
    </label>
    <button type="submit">가져오기</button>
  </form>

  {% if error_message %}
    <p class="flash flash-error search-error">{{ error_message }}</p>
  {% endif %}

  {% if content is not none %}
    <section class="card">
      <div class="card-header">
        <div>
          <h2>가져온 자료</h2>
          <p>{{ url }}</p>
        </div>
        <span class="badge">HTTP {{ status_code }}</span>
      </div>
      <pre class="compact-dl">{{ content }}</pre>
    </section>
  {% endif %}
{% endblock %}
