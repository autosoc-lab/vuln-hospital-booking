{% extends "base.html" %}

{% block content %}
  <section class="section-heading split-heading">
    <div>
      <p class="eyebrow">Documents</p>
      <h1>진료의뢰서 링크 확인</h1>
      <p>협력 병원에서 전달받은 진료의뢰서 링크를 열람 전에 미리 확인합니다.</p>
    </div>
    <a class="secondary-link" href="{{ url_for('user_pages.documents') }}">문서함</a>
  </section>

  <form class="filter-form" method="get" action="{{ url_for('user_pages.referral_link_preview') }}">
    <label>
      진료의뢰서 링크
      <input name="url" type="text" value="{{ url }}" placeholder="https://partner-hospital.example.com/referral">
    </label>
    <button type="submit">확인하기</button>
  </form>

  {% if error_message %}
    <p class="flash flash-error search-error">{{ error_message }}</p>
  {% endif %}

  {% if content is not none %}
    <section class="card">
      <div class="card-header">
        <div>
          <h2>가져온 자료</h2>
          <p>{{ url }}</p>
        </div>
        <span class="badge">HTTP {{ status_code }}</span>
      </div>
      <pre class="compact-dl">{{ content }}</pre>
    </section>
  {% endif %}
{% endblock %}
