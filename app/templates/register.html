{% extends "base.html" %}

{% block content %}
  <section class="auth-panel">
    <div class="section-heading">
      <p class="eyebrow">Account Access</p>
      <h1>회원가입</h1>
      <p>진료 예약과 의료 문서 조회를 위한 환자 계정을 만듭니다.</p>
    </div>

    {% if error %}
      <p class="form-error">{{ error }}</p>
    {% endif %}

    <form class="form" method="post" action="{{ url_for('auth.register') }}">
      <label for="username">아이디</label>
      <input
        id="username"
        name="username"
        type="text"
        autocomplete="username"
        value="{{ form.username or '' }}"
        required
      >

      <label for="full_name">이름</label>
      <input
        id="full_name"
        name="full_name"
        type="text"
        autocomplete="name"
        value="{{ form.full_name or '' }}"
        required
      >

      <label for="email">이메일</label>
      <input
        id="email"
        name="email"
        type="email"
        autocomplete="email"
        value="{{ form.email or '' }}"
        required
      >

      <label for="password">비밀번호</label>
      <input id="password" name="password" type="password" autocomplete="new-password" required>

      <label for="password_confirm">비밀번호 확인</label>
      <input
        id="password_confirm"
        name="password_confirm"
        type="password"
        autocomplete="new-password"
        required
      >

      <button type="submit">가입하기</button>
    </form>

    <p class="auth-switch">
      이미 계정이 있나요?
      <a href="{{ url_for('auth.login_form') }}">로그인</a>
    </p>
  </section>
{% endblock %}
