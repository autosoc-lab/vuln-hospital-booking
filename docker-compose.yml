services:
  web:
    build: .
    ports:
      - "${WEB_PORT:-5001}:5000"
    environment:
      APP_NAME: "Vulnerable Hospital Booking"
      SECRET_KEY: "dev-secret-key-change-me"
      FLASK_DEBUG: "1"
      PORT: "5000"
      DATABASE_URL: "postgresql+psycopg://hospital:hospital@db:5432/hospital"
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: "hospital"
      POSTGRES_USER: "hospital"
      POSTGRES_PASSWORD: "hospital"
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
